<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <script
        src='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js'></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">
    <link rel="stylesheet" href="style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>


<body>
    <!-- MAP CONTAINER -->
    <div id='map' class='map'></div>

    <div class="legend">
        <h3>Pedestrian/Cycling Collisions</h3>
    </div>

    <div class="controls">
        <h4>Toggle Map Layers</h4>
        <label> <input type="checkbox" id="show-hexgrid" checked> Show Hexgrid</label>
        <label> <input type="checkbox" id="show-collisions" checked> Show Collisions </label>
    </div>
    <script src="script.js"></script>
</body>

</html>
